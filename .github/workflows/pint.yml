name: Fix Code Style

on:
    push:
        branches: [main]

jobs:
    pint:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.head_ref }}

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.2"

            - run: composer install --no-interaction --prefer-dist

            - name: Run Pint
              run: composer lint

            - name: Commit changes
              uses: stefanzweifel/git-auto-commit-action@v5
              with:
                  commit_message: "style: apply Laravel Pint fixes"
